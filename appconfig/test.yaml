---
environment: production
environmentCode: test
container:
  messageQueueHost: DEVFFCINFSB1001.servicebus.windows.net
  xbTopicAddress: ffc-pay-xb
  xbSubscriptionAddress: ffc-pay-xb
  xbResponseTopicAddress: ffc-pay-xb-response
secretProviderClass:
  azure:
    keyvaultName: DEVFFCINFKV1001
    objects:
      - objectName: devtest-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: test-ffc-pay-mssql-password
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-xb
      type: Opaque
      data:
        - objectName: devtest-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: test-ffc-pay-mssql-password
          key: MSSQL_PASSWORD