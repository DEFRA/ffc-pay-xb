---
environment: production
environmentCode: prd
container:
  messageQueueHost: PRDFFCINFSB1001.servicebus.windows.net
  xbTopicAddress: ffc-pay-xb
  xbSubscriptionAddress: ffc-pay-xb
  xbResponseTopicAddress: ffc-pay-xb-response
secretProviderClass:
  azure:
    keyvaultName: PRDFFCINFKV1001
    objects:
      - objectName: prd-ffcahwr-appinsights-connectionString
        objectType: secret
      - objectName: ffc-pay-mssql-password
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-xb
      type: Opaque
      data:
        - objectName: prd-ffcahwr-appinsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: ffc-pay-mssql-password
          key: MSSQL_PASSWORD